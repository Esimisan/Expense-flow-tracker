<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Auth guard -->
  <script>
    if (!localStorage.getItem('expenseflow_user')) {
      window.location.replace('index.html');
    }
  </script>
  <link rel="stylesheet" href="Css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>ExpenseFlow – Settings</title>
</head>
<body>

  <header class="settings-header">
    <h1>Settings</h1>
  </header>

  <main class="settings-main">

    <!-- ========================
         PROFILE SECTION
         ======================== -->
    <section class="profile-section">
      <!-- Avatar display + tap to change -->
      <div class="avatar-wrap">
        <img id="profile-avatar" src="/images/Property 1=04.png" alt="Profile picture">
        <button class="change-avatar-btn" id="change-avatar-btn" aria-label="Change profile picture">
          <i class="fa-solid fa-camera"></i>
        </button>
      </div>

      <p id="profile-name" class="profile-name">—</p>
      <p id="profile-email" class="profile-email">—</p>

      <!-- Avatar picker — shown/hidden by JS -->
      <div id="avatar-picker" class="avatar-picker hidden">
        <p class="picker-label">Choose a profile picture</p>
        <div class="avatar-grid">
          <img src="/images/Property 1=04.png" alt="Avatar 1" class="avatar-option" data-src="/images/Property 1=04.png">
          <img src="/images/Property 1=05.png" alt="Avatar 2" class="avatar-option" data-src="/images/Property 1=05.png">
          <img src="/images/Property 1=06.png" alt="Avatar 3" class="avatar-option" data-src="/images/Property 1=06.png">
          <img src="/images/Property 1=07.png" alt="Avatar 4" class="avatar-option" data-src="/images/Property 1=07.png">
          <img src="/images/Property 1=08.png" alt="Avatar 5" class="avatar-option" data-src="/images/Property 1=08.png">
          <img src="/images/Property 1=09.png" alt="Avatar 6" class="avatar-option" data-src="/images/Property 1=09.png">
        </div>
      </div>
    </section>

    <!-- ========================
         PREFERENCES
         ======================== -->
    <fieldset class="settings-fieldset">
      <legend>PREFERENCES</legend>

      <!-- Currency -->
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-icon blue">
            <i class="fa-solid fa-naira-sign"></i>
          </div>
          <span class="settings-label">Currency</span>
        </div>
      </div>
      <div class="settings-select-wrap">
        <select id="currency-select">
          <option value="AED">UAE Dirham (AED)</option>
          <option value="AFN">Afghan Afghani (AFN)</option>
          <option value="ALL">Albanian Lek (ALL)</option>
          <option value="AMD">Armenian Dram (AMD)</option>
          <option value="ARS">Argentine Peso (ARS)</option>
          <option value="AUD">Australian Dollar (AUD)</option>
          <option value="AZN">Azerbaijani Manat (AZN)</option>
          <option value="BAM">Bosnia-Herzegovina Convertible Mark (BAM)</option>
          <option value="BDT">Bangladeshi Taka (BDT)</option>
          <option value="BGN">Bulgarian Lev (BGN)</option>
          <option value="BHD">Bahraini Dinar (BHD)</option>
          <option value="BND">Brunei Dollar (BND)</option>
          <option value="BOB">Bolivian Boliviano (BOB)</option>
          <option value="BRL">Brazilian Real (BRL)</option>
          <option value="BWP">Botswanan Pula (BWP)</option>
          <option value="BYN">Belarusian Ruble (BYN)</option>
          <option value="BZD">Belize Dollar (BZD)</option>
          <option value="CAD">Canadian Dollar (CAD)</option>
          <option value="CHF">Swiss Franc (CHF)</option>
          <option value="CLP">Chilean Peso (CLP)</option>
          <option value="CNY">Chinese Yuan (CNY)</option>
          <option value="COP">Colombian Peso (COP)</option>
          <option value="CRC">Costa Rican Colón (CRC)</option>
          <option value="CZK">Czech Koruna (CZK)</option>
          <option value="DKK">Danish Krone (DKK)</option>
          <option value="DOP">Dominican Peso (DOP)</option>
          <option value="DZD">Algerian Dinar (DZD)</option>
          <option value="EGP">Egyptian Pound (EGP)</option>
          <option value="ETB">Ethiopian Birr (ETB)</option>
          <option value="EUR">Euro (EUR)</option>
          <option value="GBP">British Pound Sterling (GBP)</option>
          <option value="GEL">Georgian Lari (GEL)</option>
          <option value="GHS">Ghanaian Cedi (GHS)</option>
          <option value="GTQ">Guatemalan Quetzal (GTQ)</option>
          <option value="HKD">Hong Kong Dollar (HKD)</option>
          <option value="HNL">Honduran Lempira (HNL)</option>
          <option value="HRK">Croatian Kuna (HRK)</option>
          <option value="HUF">Hungarian Forint (HUF)</option>
          <option value="IDR">Indonesian Rupiah (IDR)</option>
          <option value="ILS">Israeli New Shekel (ILS)</option>
          <option value="INR">Indian Rupee (INR)</option>
          <option value="IQD">Iraqi Dinar (IQD)</option>
          <option value="IRR">Iranian Rial (IRR)</option>
          <option value="ISK">Icelandic Króna (ISK)</option>
          <option value="JMD">Jamaican Dollar (JMD)</option>
          <option value="JOD">Jordanian Dinar (JOD)</option>
          <option value="JPY">Japanese Yen (JPY)</option>
          <option value="KES">Kenyan Shilling (KES)</option>
          <option value="KGS">Kyrgyzstani Som (KGS)</option>
          <option value="KHR">Cambodian Riel (KHR)</option>
          <option value="KRW">South Korean Won (KRW)</option>
          <option value="KWD">Kuwaiti Dinar (KWD)</option>
          <option value="KZT">Kazakhstani Tenge (KZT)</option>
          <option value="LBP">Lebanese Pound (LBP)</option>
          <option value="LKR">Sri Lankan Rupee (LKR)</option>
          <option value="LYD">Libyan Dinar (LYD)</option>
          <option value="MAD">Moroccan Dirham (MAD)</option>
          <option value="MDL">Moldovan Leu (MDL)</option>
          <option value="MMK">Myanmar Kyat (MMK)</option>
          <option value="MUR">Mauritian Rupee (MUR)</option>
          <option value="MXN">Mexican Peso (MXN)</option>
          <option value="MYR">Malaysian Ringgit (MYR)</option>
          <option value="MZN">Mozambican Metical (MZN)</option>
          <option value="NAD">Namibian Dollar (NAD)</option>
          <option value="NGN" selected>Nigerian Naira (NGN)</option>
          <option value="NOK">Norwegian Krone (NOK)</option>
          <option value="NPR">Nepalese Rupee (NPR)</option>
          <option value="NZD">New Zealand Dollar (NZD)</option>
          <option value="OMR">Omani Rial (OMR)</option>
          <option value="PAB">Panamanian Balboa (PAB)</option>
          <option value="PEN">Peruvian Sol (PEN)</option>
          <option value="PHP">Philippine Peso (PHP)</option>
          <option value="PKR">Pakistani Rupee (PKR)</option>
          <option value="PLN">Polish Zloty (PLN)</option>
          <option value="QAR">Qatari Riyal (QAR)</option>
          <option value="RON">Romanian Leu (RON)</option>
          <option value="RSD">Serbian Dinar (RSD)</option>
          <option value="RUB">Russian Ruble (RUB)</option>
          <option value="SAR">Saudi Riyal (SAR)</option>
          <option value="SEK">Swedish Krona (SEK)</option>
          <option value="SGD">Singapore Dollar (SGD)</option>
          <option value="THB">Thai Baht (THB)</option>
          <option value="TND">Tunisian Dinar (TND)</option>
          <option value="TRY">Turkish Lira (TRY)</option>
          <option value="TWD">Taiwanese Dollar (TWD)</option>
          <option value="TZS">Tanzanian Shilling (TZS)</option>
          <option value="UAH">Ukrainian Hryvnia (UAH)</option>
          <option value="UGX">Ugandan Shilling (UGX)</option>
          <option value="USD">United States Dollar (USD)</option>
          <option value="UYU">Uruguayan Peso (UYU)</option>
          <option value="UZS">Uzbekistani Som (UZS)</option>
          <option value="VES">Venezuelan Bolívar (VES)</option>
          <option value="VND">Vietnamese Dong (VND)</option>
          <option value="XAF">Central African CFA Franc (XAF)</option>
          <option value="XOF">West African CFA Franc (XOF)</option>
          <option value="YER">Yemeni Rial (YER)</option>
          <option value="ZAR">South African Rand (ZAR)</option>
          <option value="ZMW">Zambian Kwacha (ZMW)</option>
        </select>
        <i class="fa-solid fa-chevron-down select-arrow"></i>
      </div>

      <div class="fieldset-divider"></div>

      <!-- Monthly Budget -->
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-icon blue">
            <i class="fa-solid fa-wallet"></i>
          </div>
          <span class="settings-label">Monthly Budget</span>
        </div>
      </div>
      <div class="budget-input-wrap">
        <span class="budget-symbol">₦</span>
        <input
          id="budget-input"
          type="number"
          min="0"
          placeholder="0"
        >
      </div>

      <div class="fieldset-divider"></div>

      <!-- Dark Mode -->
      <div class="settings-row settings-row-inline">
        <div class="settings-row-left">
          <div class="settings-icon indigo">
            <i class="fa-solid fa-moon"></i>
          </div>
          <span class="settings-label">Dark Mode</span>
        </div>
        <label class="toggle-switch" aria-label="Toggle dark mode">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>

    </fieldset>

    <!-- ========================
         DATA MANAGEMENT
         ======================== -->
    <fieldset class="settings-fieldset">
      <legend>DATA MANAGEMENT</legend>

      <!-- Sign Out -->
      <button class="action-btn sign-out-btn" id="sign-out-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>

      <!-- Clear All Data -->
      <button class="action-btn clear-btn" id="clear-btn">
        <i class="fa-solid fa-trash"></i> Clear All Data
      </button>

      <p class="data-warning">
        This action will permanently delete all your expenses and cannot be undone.
      </p>

      <!-- App info -->
      <p class="app-info">
        Expense Tracker v1.0<br>Made with care
      </p>

    </fieldset>

  </main>

  <footer>
    <nav class="bottom-nav">
      <ul>
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-house"></i>
            Home
          </a>
        </li>
        <li>
          <a href="analysis.html">
            <i class="fa-solid fa-chart-pie"></i>
            Analysis
          </a>
        </li>
        <li>
          <a href="settings.html" class="active">
            <i class="fa-solid fa-gear"></i>
            Settings
          </a>
        </li>
      </ul>
    </nav>
  </footer>

  <script src="js/settings.js"></script>
</body>
</html>
